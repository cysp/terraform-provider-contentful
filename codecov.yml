comment:
  layout: "header,diff,flags,components"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: contentful-management-go
      name: contentful-management-go
      paths:
        - internal/contentful-management-go/**
    - component_id: provider
      name: provider
      paths:
        - internal/provider/**

ignore:
  - 'main.go'
  - '**/*_gen.go'
